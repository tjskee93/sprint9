services:
  kafka:
    image: bitnami/kafka:3.9.0
    container_name: bank-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: kafka-cluster
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm", "--http-port=9090"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "9090:9090"
    volumes:
      - ./keycloak/my-bank-realm.json:/opt/keycloak/data/import/my-bank-realm.json:ro

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    environment:
      SERVER_PORT: 8081
      BANK_JWK_SET_URI: http://keycloak:9090/realms/my-bank/protocol/openid-connect/certs
      ACCOUNTS_BASE_URL: http://accounts:8083
      CASH_BASE_URL: http://cash:8090
      TRANSFER_BASE_URL: http://transfer:8084
    depends_on:
      accounts-service: { condition: service_started }
      cash-service: { condition: service_started }
      transfer-service: { condition: service_started }
    ports:
      - "8081:8081"


  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
      POSTGRES_DB: bank
    ports:
      - "5432:5432"
    volumes:
      - bank-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank"]
      interval: 5s
      timeout: 3s
      retries: 10


  front-ui:
    build:
      context: .
      dockerfile: front-ui/Dockerfile
    container_name: my-bank-front
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      BANK_GATEWAY_URL: http://gateway:8081
      BANK_AUTHORIZATION_URI: http://localhost:9090/realms/my-bank/protocol/openid-connect/auth
      BANK_TOKEN_URI: http://keycloak:9090/realms/my-bank/protocol/openid-connect/token
      BANK_USER_INFO_URI: http://keycloak:9090/realms/my-bank/protocol/openid-connect/userinfo
      BANK_JWK_SET_URI: http://keycloak:9090/realms/my-bank/protocol/openid-connect/certs
      BANK_LOGOUT_URI: http://localhost:9090/realms/my-bank/protocol/openid-connect/logout
      FRONT_CLIENT_ID: front-ui
      FRONT_CLIENT_SECRET: front-secret
    ports:
      - "8080:8080"
    depends_on:
      - gateway
      - keycloak

  accounts-service:
    build:
      context: .
      dockerfile: accounts-service/Dockerfile
    container_name: my-bank-accounts
    restart: unless-stopped
    environment:
      SERVER_PORT: 8083
      PG_HOST: postgres
      BANK_JWK_SET_URI: http://keycloak:9090/realms/my-bank/protocol/openid-connect/certs
      BANK_TOKEN_URI: http://keycloak:9090/realms/my-bank/protocol/openid-connect/token
      BANK_ISSUER_URI: http://localhost:9090/realms/my-bank
      ACCOUNTS_DB_URL: jdbc:postgresql://postgres:5432/bank
      ACCOUNTS_DB_USER: bank
      ACCOUNTS_DB_PASSWORD: bank
      ACCOUNTS_CLIENT_ID: accounts-service
      ACCOUNTS_CLIENT_SECRET: accounts-secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NOTIFICATIONS_TOPIC: notifications-service
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started


  cash-service:
    build:
      context: .
      dockerfile: cash-service/Dockerfile
    container_name: my-bank-cash
    restart: unless-stopped
    environment:
      SERVER_PORT: 8090
      PG_HOST: postgres
      BANK_JWK_SET_URI: http://keycloak:9090/realms/my-bank/protocol/openid-connect/certs
      BANK_TOKEN_URI: http://keycloak:9090/realms/my-bank/protocol/openid-connect/token
      BANK_ISSUER_URI: http://localhost:9090/realms/my-bank
      CASH_CLIENT_ID: cash-service
      CASH_CLIENT_SECRET: cash-secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NOTIFICATIONS_TOPIC: notifications-service
      ACCOUNTS_BASE_URL: http://accounts:8083
    depends_on:
      - accounts-service
      - kafka
      - notifications-service
      - keycloak

  transfer-service:
    build:
      context: .
      dockerfile: transfer-service/Dockerfile
    container_name: my-bank-transfer
    restart: unless-stopped
    environment:
      SERVER_PORT: 8084
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: bank
      PG_USER: bank
      PG_PASSWORD: bank
      BANK_JWK_SET_URI: http://keycloak:9090/realms/my-bank/protocol/openid-connect/certs
      BANK_TOKEN_URI: http://keycloak:9090/realms/my-bank/protocol/openid-connect/token
      BANK_ISSUER_URI: http://localhost:9090/realms/my-bank
      TRANSFER_CLIENT_ID: transfer-service
      TRANSFER_CLIENT_SECRET: transfer-secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NOTIFICATIONS_TOPIC: notifications-service
      ACCOUNTS_BASE_URL: http://accounts:8083
    depends_on:
      - accounts-service
      - kafka
      - keycloak

  notifications-service:
    build:
      context: .
      dockerfile: notifications-service/Dockerfile
    container_name: my-bank-notifications
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: bank
      PG_USER: bank
      PG_PASSWORD: bank
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BANK_NOTIFICATIONS_TOPIC: notifications-service
      BANK_NOTIFICATIONS_GROUP: notifications-service
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_healthy


volumes:
  bank-postgres-data:
  kafka-data: