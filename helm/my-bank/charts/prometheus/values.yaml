replicaCount: 1

image:
  repository: prom/prometheus
  tag: "v3.5.0"
  pullPolicy: IfNotPresent

service:
  port: 8089

scrapeInterval: 15s

alerts:
  http5xxRateThreshold: "0.05"
  failedWithdrawalsIncreaseThreshold: "1"
  failedTransfersIncreaseThreshold: "1"
  notificationFailuresIncreaseThreshold: "1"
  httpLatencyP95ThresholdSeconds: "1.5"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi