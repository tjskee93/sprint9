replicaCount: 1

image:
  repository: cash
  registry: ""
  pullPolicy: IfNotPresent
  tag: "0.0.1"

service:
  port: 8090

authentification:
  clientId: cash-service
  clientSecret: cash-secret
  jwkSetUri: "http://keycloak:9090/realms/my-bank/protocol/openid-connect/certs"
  tokenUri: "http://keycloak:9090/realms/my-bank/protocol/openid-connect/token"

urls:
  kafkaBootstrapServers: "kafka:9092"
  notificationsTopic: "notifications-service"
  accountsUrl: "http://accounts:8083"

probes:
  readiness:
    path: "/actuator/health"
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    path: "/actuator/health"
    initialDelaySeconds: 40
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 768Mi