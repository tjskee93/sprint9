apiVersion: v1
kind: Service
metadata:
  name: notifications
  labels:
    {{- include "notifications.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "notifications.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http