apiVersion: v1
kind: Pod
metadata:
  name: test-all
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: alpine:3.19
      command:
        - sh
        - -c
        - |
          apk add --no-cache curl wget netcat-openbsd
          echo "========================================="
          echo "     RUNNING ALL SERVICE TESTS          "
          echo "========================================="
          echo ""
          echo "1. Testing Gateway..."
          curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://gateway:8081/actuator/health | grep -q 200 && echo "   ✅ Gateway is healthy" || echo "   ❌ Gateway is NOT healthy"
          echo ""
          echo "2. Testing Accounts..."
          curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://accounts:8083/actuator/health | grep -q 200 && echo "   ✅ Accounts is healthy" || echo "   ❌ Accounts is NOT healthy"
          echo ""
          echo "3. Testing Cash..."
          curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://cash:8090/actuator/health | grep -q 200 && echo "   ✅ Cash is healthy" || echo "   ❌ Cash is NOT healthy"
          echo ""
          echo "4. Testing Transfer..."
          curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://transfer:8084/actuator/health | grep -q 200 && echo "   ✅ Transfer is healthy" || echo "   ❌ Transfer is NOT healthy"
          echo ""
          echo "5. Testing Notifications..."
          curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://notifications:8082/actuator/health | grep -q 200 && echo "   ✅ Notifications is healthy" || echo "   ❌ Notifications is NOT healthy"
          echo ""
          echo "6. Testing Keycloak..."
          curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://keycloak:9090/realms/master | grep -q 200 && echo "   ✅ Keycloak is healthy" || echo "   ❌ Keycloak is NOT healthy"
          echo ""
          echo "7. Testing PostgreSQL (headless service)..."
          if nc -zv postgres-0.postgres 5432 2>&1 | grep -q "succeeded\|Connected"; then
            echo "   ✅ PostgreSQL is reachable"
          else
            echo "   ❌ PostgreSQL is NOT reachable"
          fi
          echo ""
          echo "8. Testing Front-UI..."
          if curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://front-ui:8080/actuator/health | grep -q 200; then
            echo "   ✅ Front-UI is healthy"
          elif curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://front-ui:8080 | grep -q 200; then
            echo "   ✅ Front-UI is reachable"
          else
            echo "   ❌ Front-UI is NOT reachable"
          fi
          echo ""
          echo "9. Testing Kafka connectivity..."
          if nc -zv kafka 9092 2>&1 | grep -q "succeeded\|Connected"; then
            echo "   ✅ Kafka port 9092 is reachable"
          else
            echo "   ❌ Kafka port 9092 is NOT reachable"
          fi
          echo ""
          echo "10. Testing Kafka topic existence..."
          # Проверяем через wget на JMX порт или просто проверяем доступность
          if nc -zv kafka 9092 2>&1 | grep -q "succeeded\|Connected"; then
            echo "   ✅ Kafka is accessible"
          else
            echo "   ❌ Kafka is NOT accessible"
          fi
          echo ""
          echo "11. Testing Zipkin..."
          if curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://zipkin:9411/health | grep -q 200; then
            echo "   ✅ Zipkin is healthy"
          elif curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://zipkin:9411/actuator/health | grep -q 200; then
            echo "   ✅ Zipkin is healthy (actuator)"
          elif curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://zipkin:9411 | grep -q 200; then
            echo "   ✅ Zipkin is reachable"
          else
            echo "   ❌ Zipkin is NOT reachable"
          fi
          echo ""
          echo "12. Testing Grafana..."
          if curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://grafana:3000/api/health | grep -q 200; then
            echo "   ✅ Grafana is healthy"
          elif curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://grafana:3000 | grep -q 200; then
            echo "   ✅ Grafana is reachable"
          else
            echo "   ❌ Grafana is NOT reachable"
          fi
          echo ""
          echo "13. Testing Prometheus..."
          if curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://prometheus:8089/-/healthy | grep -q 200; then
            echo "   ✅ Prometheus is healthy"
          elif curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://prometheus:8089 | grep -q 200; then
            echo "   ✅ Prometheus is reachable"
          else
            echo "   ❌ Prometheus is NOT reachable"
          fi
          echo ""
          echo "14. Testing Elasticsearch..."
          if curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://elasticsearch:9200 | grep -q 200; then
            echo "   ✅ Elasticsearch is reachable"
          elif curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://elasticsearch:9200/_cluster/health | grep -q 200; then
            echo "   ✅ Elasticsearch is healthy"
          else
            echo "   ❌ Elasticsearch is NOT reachable"
          fi
          echo ""
          echo "15. Testing Logstash..."
          # Logstash не имеет HTTP эндпоинта для проверки, проверяем порт
          if nc -zv logstash 5000 2>&1 | grep -q "succeeded\|Connected"; then
            echo "   ✅ Logstash port 5000 is reachable"
          elif nc -zv logstash 9600 2>&1 | grep -q "succeeded\|Connected"; then
            echo "   ✅ Logstash API port 9600 is reachable"
          else
            echo "   ❌ Logstash is NOT reachable"
          fi
          echo ""
          echo "16. Testing Kibana..."
          if curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://kibana:5601/api/status | grep -q 200; then
            echo "   ✅ Kibana is healthy"
          elif curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://kibana:5601 | grep -q 200; then
            echo "   ✅ Kibana is reachable"
          else
            echo "   ❌ Kibana is NOT reachable"
          fi
          echo ""
          echo "========================================="
          echo "     ✅ ALL TESTS COMPLETED!            "
          echo "========================================="