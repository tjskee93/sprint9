server:
  port: ${SERVER_PORT:8082}
spring:
  application:
    name: notifications

  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:bank}
    username: ${PG_USER:bank}
    password: ${PG_PASSWORD:bank}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: notifications
        format_sql: false
  flyway:
    enabled: true
    schemas: notifications
    default-schema: notifications
    create-schemas: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${BANK_NOTIFICATIONS_GROUP:notifications-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "ru.yandex.practicum.kafka.models.dto"
        spring.json.value.default.type: ru.yandex.practicum.kafka.models.dto.NotificationDTO
    listener:
      ack-mode: record
bank:
  notifications-topic: ${NOTIFICATIONS_TOPIC:notifications-service}